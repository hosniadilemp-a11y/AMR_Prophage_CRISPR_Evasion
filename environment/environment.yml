name: amr_env
channels:
  - bioconda
  - conda-forge
  - defaults
dependencies:
  # Core Language
  - python=3.10
  - pip

  # Annotation & Profiling
  - abricate=1.0.1
  - ncbi-amrfinderplus=4.2.7

  # Mobile Genetic Elements & Synteny
  - clinker=0.0.32

  # Core Python Libraries
  - numpy=1.26.4
  - pandas=2.2.2
  - scipy=1.13.0
  - scikit-learn=1.4.2
  - matplotlib=3.9.0
  - seaborn=0.13.2
  - biopython=1.83
  - networkx=3.3

  # BLAST
  - blast=2.14.1

  # Molecular Dynamics & Plotting
  - pip:
      - mdtraj==1.9.9
      - MDAnalysis==2.7.0
      - statsmodels==0.14.2
      - requests==2.31.0
      - tqdm==4.66.4
      - openmm==8.1.1
      - pdbfixer==1.9
      - pyyaml==6.0.1

  # Utilities
  - wget=1.21.4
  - curl=8.7.1
  - git=2.43.0
