# =============================================================================
# Molecular Dynamics Configuration — OpenMM Parameters for AMR Prophage CRISPR Evasion
# =============================================================================

# --- Force Field Selection ---
forcefield: "amber14-all.xml"
lipid_forcefield: "charmm36" # Used for membrane bilayer setup
water_model: "amber14/tip3pfb.xml"

# --- Simulation Parameters ---
temperature: 310.0          # Kelvin (human body temperature)
pressure: 1.0               # atm
friction_coefficient: 1.0   # ps^-1 (Langevin thermostat collision frequency)
timestep: 0.002             # ps (2 fs)

# --- Boundary Conditions & Electrostatics ---
nonbonded_method: "PME"     # Particle Mesh Ewald
nonbonded_cutoff: 1.0       # nm
padding: 1.2                # nm (padding of water box around protein)
ionic_strength: 0.15        # Molar NaCl (physiological concentration)

# --- Production Runs Configuration ---
runs:
  ehly_membrane:
    steps: 50000000         # 100 ns
    checkpoint_steps: 500000
    report_steps: 5000
    lipid_type: "POPC:POPG"
    ratio: "3:1"
  antirepressor_aqueous:
    steps: 50000000         # 100 ns
    checkpoint_steps: 500000
    report_steps: 5000
